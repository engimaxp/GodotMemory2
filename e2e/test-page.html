<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 110px;
      height: 110px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }
    .bubble:hover { transform: scale(1.05); }
    .bubble:active { transform: scale(0.95); }
    .bubble-ring {
      position: absolute; inset: -3px; border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(#ffd700 0deg, #4a9eff 90deg, #22c55e 180deg, #ffd700 360deg) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0.5;
    }
    .bubble-icon { display: flex; align-items: center; justify-content: center; color: white; }

    .panel {
      position: fixed;
      top: 0; right: 0;
      width: 750px; height: 100vh;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      display: none;
      flex-direction: column;
      z-index: 2000;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }
    .panel.visible { display: flex; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .panel-header h2 { color: #e0e0e0; font-size: 16px; font-weight: 600; }
    .panel-close {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .panel-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .panel-body { flex: 1; padding: 20px; color: #aaa; }
  </style>
</head>
<body>
  <div id="app">
    <div class="bubble" id="bubble">
      <div class="bubble-ring"></div>
      <div class="bubble-icon">
        <svg width="66" height="66" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </div>
    </div>

    <div class="panel" id="panel">
      <div class="panel-header">
        <h2 id="panel-title">面板</h2>
        <button class="panel-close" id="panel-close" aria-label="收起">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="panel-body">
        <p>面板内容区域</p>
      </div>
    </div>
  </div>

  <script>
    const bubble = document.getElementById('bubble');
    const panel = document.getElementById('panel');
    const closeBtn = document.getElementById('panel-close');

    function keepBubbleInViewport() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = bubble.offsetWidth;
      const bh = bubble.offsetHeight;
      let left = parseFloat(bubble.style.left) || (vw - bw) / 2;
      let top = parseFloat(bubble.style.top) || (vh - bh) / 2;
      left = Math.max(0, Math.min(left, vw - bw));
      top = Math.max(0, Math.min(top, vh - bh));
      bubble.style.left = left + 'px';
      bubble.style.top = top + 'px';
    }

    bubble.addEventListener('click', function() {
      bubble.style.display = 'none';
      panel.classList.add('visible');
    });

    closeBtn.addEventListener('click', function() {
      panel.classList.remove('visible');
      bubble.style.display = 'flex';
      keepBubbleInViewport();
    });

    window.addEventListener('load', function() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      bubble.style.left = (vw - bubble.offsetWidth) / 2 + 'px';
      bubble.style.top = (vh - bubble.offsetHeight) / 2 + 'px';
    });

    window.addEventListener('resize', keepBubbleInViewport);
  </script>
</body>
</html>
